services:
  app:
    build:
      context: .
      dockerfile: docker/next/Dockerfile
    container_name: saas-pos-app
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
      DATABASE_URL: mysql://saas_pos_user:saas_pos_password@mysql:3306/saas_pos_db
    depends_on:
      - mysql

  mysql:
    image: mysql:8.0
    container_name: saas-pos-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: saas_pos_db
      MYSQL_USER: saas_pos_user
      MYSQL_PASSWORD: saas_pos_password
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
  adminer:
    image: adminer:latest
    container_name: saas-pos-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - mysql
volumes:
  mysql_data:
