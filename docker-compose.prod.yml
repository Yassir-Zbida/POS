name: hssabaty-pos-prod

# Production-style stack: built Next.js app + MySQL.
# Usage:
#   export JWT_SECRET="strong-random-secret"
#   docker compose -f docker-compose.prod.yml up --build -d
#
# Override DB credentials with env vars if needed (see `mysql` service).

services:
  app:
    build:
      context: .
      dockerfile: docker/next/Dockerfile.prod
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: mysql://saas_pos_user:saas_pos_password@mysql:3306/saas_pos_db
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      APP_URL: ${APP_URL:-http://localhost:3000}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-in-production}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-}
      MAIL_REPLY_TO: ${MAIL_REPLY_TO:-}
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    ports:
      - "3307:3306"
    healthcheck:
      # Keep password in sync with MYSQL_ROOT_PASSWORD default below.
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-saas_pos_db}
      MYSQL_USER: ${MYSQL_USER:-saas_pos_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-saas_pos_password}
    volumes:
      - mysql_data_prod:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

volumes:
  mysql_data_prod:
